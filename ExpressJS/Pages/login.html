<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 min-h-screen flex items-center justify-center">

  <!-- Container -->
  <div class="w-full max-w-md p-8 space-y-6 bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl border border-white/20">

    <!-- Logo / Title -->
    <div class="text-center">
      <h1 class="text-3xl font-semibold text-white">Welcome Back</h1>
      <p class="text-gray-300 text-sm mt-2">Login to your account</p>
    </div>

    <!-- Form -->
    <form class="space-y-5">

      <!-- Email -->
      <div>
        <label class="block text-sm text-gray-300 mb-1">Email</label>
        <input 
          type="email" 
          placeholder="Enter your email"
          class="w-full px-4 py-2 bg-white/20 text-white placeholder-gray-300 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
        />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm text-gray-300 mb-1">Password</label>
        <input 
          type="password" 
          placeholder="Enter your password"
          class="w-full px-4 py-2 bg-white/20 text-white placeholder-gray-300 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
        />
      </div>

      <!-- Options -->
      <div class="flex items-center justify-between text-sm text-gray-300">
        <label class="flex items-center space-x-2">
          <input type="checkbox" class="accent-blue-500">
          <span>Remember me</span>
        </label>
        <a href="#" class="hover:text-blue-400">Forgot password?</a>
      </div>

      <!-- Button -->
      <button 
        type="submit"
        class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition duration-300 shadow-lg"
      >
        Sign In
      </button>

    </form>

    <!-- Divider -->
    <div class="flex items-center gap-3">
      <div class="flex-1 h-px bg-white/20"></div>
      <span class="text-gray-300 text-sm">OR</span>
      <div class="flex-1 h-px bg-white/20"></div>
    </div>

    <!-- Social Buttons -->
    <div class="grid grid-cols-2 gap-3">
      <button class="py-2 bg-white text-gray-800 rounded-lg font-medium hover:bg-gray-200 transition">
        Google
      </button>
      <button class="py-2 bg-gray-800 text-white rounded-lg font-medium hover:bg-gray-700 transition">
        GitHub
      </button>
    </div>

    <!-- Signup -->
    <p class="text-center text-gray-300 text-sm">
      Don’t have an account?
      <a href="#" class="text-blue-400 hover:underline">Sign up</a>
    </p>

  </div>

</body>
</html>
